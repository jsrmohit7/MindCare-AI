services:
  # -------------------------------------------------------
  # Backend Service: FastAPI
  # -------------------------------------------------------
  - type: web
    name: mindcare-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app:app --host 0.0.0.0 --port $PORT
    plan: starter
    envVars:
      - key: DEBUG
        value: "False"
      - key: MONGODB_URL
        sync: false # Set MongoDB Atlas Connection String in Render Dashboard
      - key: MONGODB_DB
        value: mindcare_ai
      - key: CORS_ORIGINS
        value: https://mindcare-frontend-4ays.onrender.com,https://mindcare-ai-4ays.onrender.com,http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001
      - key: IBM_API_KEY
        sync: false # Set IBM watsonx.ai API Key in Render Dashboard
      - key: IBM_PROJECT_ID
        sync: false # Set IBM watsonx.ai Project ID in Render Dashboard
      - key: IBM_URL
        value: https://eu-de.ml.cloud.ibm.com
      - key: IBM_GRANITE_MODEL
        value: ibm/granite-13b-instruct-v2
      - key: PYTHON_VERSION
        value: 3.11.10

  # -------------------------------------------------------
  # Frontend Service: Next.js
  # -------------------------------------------------------
  - type: web
    name: mindcare-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    dockerContext: frontend
    plan: starter
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://mindcare-ai-c7js.onrender.com/api/v1
